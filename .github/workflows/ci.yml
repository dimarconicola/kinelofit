name: CI

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: 1
      APP_SESSION_SECRET: ci-session-secret
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Start app
        run: |
          npm run start -- --hostname 127.0.0.1 --port 3000 > /tmp/kinelo-start.log 2>&1 &
          echo $! > /tmp/kinelo-start.pid
          for i in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:3000/it > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/kinelo-start.log
          exit 1

      - name: Smoke routes
        run: npm run smoke:routes

      - name: Stop app
        if: always()
        run: |
          if [ -f /tmp/kinelo-start.pid ]; then
            kill $(cat /tmp/kinelo-start.pid) || true
          fi
